name: Vendor Brazil map asset

on:
  push:
    branches:
      - fix-mapa-estados-reais
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vendor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix-mapa-estados-reais

      - name: Download and normalize Brazil SVG
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 4 \
            "https://raw.githubusercontent.com/react-map/react-map/3ed7f9b956e9031fd284ad654164b5abf6c0cdda/assets/done/brazil.svg" \
            --output /tmp/brazil.svg

          python - <<'PY'
          from pathlib import Path
          import re

          raw = Path('/tmp/brazil.svg').read_text(encoding='utf-8-sig')
          paths = re.findall(r'<path id="(BR-[A-Z]{2})" title="([^"]+)" class="land" d="([^"]+)"/>', raw)
          if len(paths) != 27:
              raise SystemExit(f'Expected 27 states, found {len(paths)}')

          output = [
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 640" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Mapa do Brasil por estados">',
              '<g>'
          ]
          for state_id, title, path_data in paths:
              output.append(f'<path id="{state_id}" data-state="{state_id[3:]}" title="{title}" d="{path_data}"/>')
          output.extend(['</g>', '</svg>'])

          target = Path('assets/maps/brazil-states.svg')
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(''.join(output), encoding='utf-8')
          PY

      - name: Commit local map asset
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/maps/brazil-states.svg
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: versionar mapa real do Brasil"
          git push origin HEAD:fix-mapa-estados-reais
