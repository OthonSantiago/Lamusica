name: Show Git tree

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/artistas-representantes-b2b
          fetch-depth: 1
          show-progress: false
      - name: Save tree SHA
        run: git rev-parse 'HEAD^{tree}' > tree-sha.txt
      - name: Upload tree SHA
        uses: actions/upload-artifact@v4
        with:
          name: tree-sha
          path: tree-sha.txt
          retention-days: 1
