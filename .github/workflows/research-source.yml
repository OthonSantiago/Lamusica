name: Research public source content

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch public La Música pages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source
          urls=(
            "https://lamusica.com.br/artistas/"
            "https://lamusica.com.br/representantes/"
            "https://lamusica.com.br/angelo-torres/"
            "https://lamusica.com.br/elias-coutinho/"
            "https://lamusica.com.br/theo-santos/"
            "https://lamusica.com.br/suelen-mondini/"
            "https://lamusica.com.br/samuel-pompeo/"
            "https://lamusica.com.br/herson-amorin/"
            "https://lamusica.com.br/fabio-costa/"
            "https://lamusica.com.br/marcelo-fofao/"
            "https://lamusica.com.br/ivan-sacerdote/"
          )
          for url in "${urls[@]}"; do
            slug=$(echo "$url" | awk -F/ '{print $(NF-1)}')
            echo "Fetching $url"
            curl --fail --location --retry 5 --retry-all-errors --connect-timeout 20 --max-time 120 \
              -A "Mozilla/5.0" "$url" -o "source/${slug}.html"
          done

      - name: Extract readable text and download public artist images
        shell: bash
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urljoin, urlparse
          from urllib.request import Request, urlopen
          import json, re, time

          class Extractor(HTMLParser):
              def __init__(self, base):
                  super().__init__()
                  self.base = base
                  self.skip = 0
                  self.text = []
                  self.links = []
                  self.images = []
              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if tag in {'script','style','noscript','svg'}:
                      self.skip += 1
                  if tag == 'a' and attrs.get('href'):
                      self.links.append(urljoin(self.base, attrs['href']))
                  if tag == 'img':
                      src = attrs.get('src') or attrs.get('data-src') or attrs.get('data-lazy-src')
                      if src:
                          self.images.append(urljoin(self.base, src))
              def handle_endtag(self, tag):
                  if tag in {'script','style','noscript','svg'} and self.skip:
                      self.skip -= 1
                  if tag in {'p','h1','h2','h3','h4','h5','h6','li','div','br'}:
                      self.text.append('\n')
              def handle_data(self, data):
                  if not self.skip:
                      cleaned = re.sub(r'\s+', ' ', data).strip()
                      if cleaned:
                          self.text.append(cleaned + ' ')

          assets = Path('source/assets')
          assets.mkdir(parents=True, exist_ok=True)

          for path in Path('source').glob('*.html'):
              base = f"https://lamusica.com.br/{path.stem}/"
              raw = path.read_text(encoding='utf-8', errors='ignore')
              parser = Extractor(base)
              parser.feed(raw)
              inline_urls = re.findall(r'https?[^\"\' )]+(?:png|jpe?g|webp)', raw, re.I)
              images = sorted(set(parser.images + [u.replace('\\/','/') for u in inline_urls]))
              text = ''.join(parser.text)
              text = re.sub(r'\n\s*\n+', '\n', text)
              Path(f'source/{path.stem}.txt').write_text(text, encoding='utf-8')
              Path(f'source/{path.stem}.json').write_text(json.dumps({
                  'links': sorted(set(parser.links)),
                  'images': images,
              }, ensure_ascii=False, indent=2), encoding='utf-8')

              candidates = [u for u in images if 'uploads/' in u and 'logo' not in u.lower() and 'cropped-' not in u.lower()]
              for index, url in enumerate(candidates, 1):
                  suffix = Path(urlparse(url).path).suffix.lower() or '.jpg'
                  target = assets / f'{path.stem}-{index}{suffix}'
                  try:
                      req = Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                      with urlopen(req, timeout=60) as response:
                          target.write_bytes(response.read())
                      print(f'Downloaded {target} from {url}')
                  except Exception as exc:
                      print(f'Could not download {url}: {exc}')
                  time.sleep(.2)

              print(f"===== {path.stem.upper()} =====")
              print(text[:25000])
              print("===== MEDIA =====")
              print(json.dumps({'images': images, 'links': sorted(set(parser.links))}, ensure_ascii=False)[:20000])
          PY

      - name: Upload research artifact
        uses: actions/upload-artifact@v4
        with:
          name: lamusica-public-source
          path: source/
          retention-days: 1
