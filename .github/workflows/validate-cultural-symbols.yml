name: Validate Brazilian and Argentine cultural symbols

on:
  push:
    branches:
      - feat-hero-real-motion
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-symbols:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Copacabana, Sugarloaf and Mendoza Andes
        run: |
          test -f src/scripts/06.js
          test -f src/scripts/07.js
          test -f src/styles/12.css
          test -f src/styles/13.css
          test -f src/styles/14.css
          node --check src/scripts/06.js
          node --check src/scripts/07.js
          grep -q "hero-copacabana" src/scripts/06.js
          grep -q "hero-sugarloaf" src/scripts/06.js
          grep -q "hero-andes" src/scripts/06.js
          grep -q "hero-obelisk" src/scripts/06.js
          grep -q "ambient-corcovado" src/scripts/07.js
          grep -q "hero-copacabana-flow" src/styles/13.css
          grep -q "hero-product-float" src/styles/14.css
          grep -q "ambient-corcovado-breathe" src/styles/12.css
          grep -q "'13', '14'" loader.js
          grep -q "'06', '07'" loader.js
