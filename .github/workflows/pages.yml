name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build one-page artifact
        run: |
          set -euo pipefail
          python3 tools/build_pages.py

          mkdir -p _site/src/assets-source
          cp -R src/assets-source/hero-background-v2 _site/src/assets-source/
          cp -R src/assets-source/hero-product _site/src/assets-source/

          test -f _site/index.html
          test -f _site/.nojekyll
          test -f _site/assets/maps/brazil-states.svg
          test -f _site/src/assets-source/hero-background-v2/part-00.b64
          test -f _site/src/assets-source/hero-product/part-00.b64
          ! grep -q 'loader.js' _site/index.html
          ! grep -q 'loader.css' _site/index.html
          ! grep -q 'src="script.js"' _site/index.html
          ! grep -q 'href="styles.css"' _site/index.html
          grep -q 'data:image/webp;base64,' _site/index.html
          grep -q 'id="inicio"' _site/index.html
          grep -q 'id="contato"' _site/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy static site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
