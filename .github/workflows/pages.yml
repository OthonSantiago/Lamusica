name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare publication artifact
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='_site/' \
            --exclude='README.md' \
            --exclude='*.docx' \
            --exclude='*.pdf' \
            --exclude='_pages_redeploy_marker.txt' \
            ./ _site/

          # O cenário do hero é armazenado em partes de texto no repositório
          # e reconstruído somente no artefato publicado. A caixa do produto
          # permanece como componente HTML/CSS independente e substituível.
          mkdir -p _site/assets/hero
          cat _site/assets/hero/source/hero-background-final.part*.b64 \
            | tr -d '\n\r ' \
            | base64 --decode \
            > _site/assets/hero/hero-background-final.webp

          test "$(head -c 4 _site/assets/hero/hero-background-final.webp)" = "RIFF"
          test "$(dd if=_site/assets/hero/hero-background-final.webp bs=1 skip=8 count=4 2>/dev/null)" = "WEBP"
          test "$(stat -c%s _site/assets/hero/hero-background-final.webp)" = "44838"
          echo "aa583ea7715f02d1fb3c9249306eaa439f36eeaed4f27025f07e0e964c5d9766  _site/assets/hero/hero-background-final.webp" | sha256sum --check --strict

          rm -rf _site/assets/hero/source
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/loader.js
          test -f _site/assets/hero/hero-background-final.webp

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
