name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare publication artifact
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='_site/' \
            --exclude='README.md' \
            --exclude='*.docx' \
            --exclude='*.pdf' \
            --exclude='_pages_redeploy_marker.txt' \
            --exclude='src/assets-source/' \
            ./ _site/

          mkdir -p _site/assets/hero
          cat src/assets-source/hero-background-v2/part-*.b64 \
            | tr -d '\n\r ' \
            | base64 --decode \
            > _site/assets/hero/hero-landscape-final.webp

          cat src/assets-source/hero-product/part-*.b64 \
            | tr -d '\n\r ' \
            | base64 --decode \
            > _site/assets/hero/hero-product-reeds.webp

          test "$(stat -c%s _site/assets/hero/hero-landscape-final.webp)" = "21818"
          test "$(head -c 4 _site/assets/hero/hero-landscape-final.webp)" = "RIFF"
          test "$(dd if=_site/assets/hero/hero-landscape-final.webp bs=1 skip=8 count=4 2>/dev/null)" = "WEBP"
          echo "42a674cb607ad0945c88f8e201f18249b2ffe035ef721423dcee4448e52ebea8  _site/assets/hero/hero-landscape-final.webp" | sha256sum -c -

          test "$(stat -c%s _site/assets/hero/hero-product-reeds.webp)" = "22758"
          test "$(head -c 4 _site/assets/hero/hero-product-reeds.webp)" = "RIFF"
          test "$(dd if=_site/assets/hero/hero-product-reeds.webp bs=1 skip=8 count=4 2>/dev/null)" = "WEBP"
          echo "b01da53a6cbe0f0e78bfb2af111a0f6d38ce1c694422f0e2ab9fdd9e2e825615  _site/assets/hero/hero-product-reeds.webp" | sha256sum -c -

          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/loader.js
          test -f _site/src/styles/21.css
          test -f _site/src/scripts/08.js
          test -f _site/assets/hero/hero-landscape-final.webp
          test -f _site/assets/hero/hero-product-reeds.webp

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
