name: Validate map and lead flow

on:
  push:
    branches:
      - feat/mapa-brasil-leads
      - fix-mapa-brasil-local-v2
      - fix-mapa-estados-reais
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JavaScript
        run: |
          cat src/scripts/00.js src/scripts/01.js src/scripts/02.js src/scripts/04.js > /tmp/site.js
          node --check /tmp/site.js
      - name: Validate real state map
        run: |
          test -f assets/maps/brazil-states.svg
          test -f src/scripts/04.js
          test -f src/styles/07.css
          test "$(grep -o 'data-state="[A-Z][A-Z]"' assets/maps/brazil-states.svg | wc -l)" -eq 27
          grep -q "path\[data-state" src/scripts/04.js
          grep -q "assets/maps/brazil-states.svg" src/scripts/04.js
          grep -q "NOVO LEAD" src/scripts/04.js
          grep -q "connect-src 'self'" loader.js
          ! grep -q "raw.githubusercontent.com" loader.js
