name: Validate cultural hero

on:
  push:
    branches:
      - fix-final-hero-image
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-hero:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate final hero image
        run: |
          test -f assets/hero/hero-la-musica-scene.webp
          test -s assets/hero/hero-la-musica-scene.webp
          test -f src/styles/15.css
          grep -q "hero-la-musica-scene.webp" src/styles/15.css
          grep -q "hero-real-scene-breathe" src/styles/15.css
          grep -q "'14', '15'" loader.js
          test -f src/scripts/06.js
          node --check src/scripts/06.js
          grep -q "pointermove" src/scripts/06.js
