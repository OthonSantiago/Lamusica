name: Validate cultural hero

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-hero:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate final hero image
        run: |
          test -f assets/hero/hero-la-musica-scene-v2.webp
          test -f src/styles/15.css
          python - <<'PY'
          from pathlib import Path
          asset = Path('assets/hero/hero-la-musica-scene-v2.webp').read_bytes()
          assert len(asset) > 5000, 'Hero image is unexpectedly small'
          assert asset[:4] == b'RIFF', 'Invalid WebP RIFF signature'
          assert asset[8:12] == b'WEBP', 'Invalid WebP format signature'
          PY
          grep -q "hero-la-musica-scene-v2.webp" src/styles/15.css
          grep -q "hero-real-scene-breathe" src/styles/15.css
          grep -q "'14', '15'" loader.js
          node --check src/scripts/06.js
          grep -q "pointermove" src/scripts/06.js
