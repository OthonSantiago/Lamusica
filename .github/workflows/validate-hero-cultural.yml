name: Validate cultural hero

on:
  push:
    branches:
      - feat-hero-real-motion
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-hero:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate final cultural hero
        run: |
          test -f src/scripts/06.js
          test -f src/styles/13.css
          test -f src/styles/14.css
          node --check src/scripts/06.js
          grep -q "hero-cultural-bg" src/scripts/06.js
          grep -q "hero-andes" src/scripts/06.js
          grep -q "hero-sugarloaf" src/scripts/06.js
          grep -q "hero-obelisk" src/scripts/06.js
          grep -q "hero-copacabana" src/scripts/06.js
          grep -q "pointermove" src/scripts/06.js
          grep -q "hero-product-float" src/styles/14.css
          ! grep -q "hero-rhythm-label" src/scripts/06.js
          ! grep -q "hero-bandoneon" src/scripts/06.js
          ! grep -q "hero-sax-line" src/scripts/06.js
          grep -q "'13', '14'" loader.js
